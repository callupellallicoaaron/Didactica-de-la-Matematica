<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-style: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #333;
        }
        .pdf-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <iframe src="Sesion de aprendizaje - Grupo12.pdf">
            <p>Tu navegador no soporta la visualización de PDFs. 
            <a href="Sesion de aprendizaje - Grupo12.pdf">Haz clic aquí para descargarlo.</a></p>
        </iframe>
    </div>

</body>
</html>
