<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesión 18 - Visualizador</title>
  <style>
    /* Eliminamos bordes y márgenes para ocupar el 100% de la ventana */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #525659; /* Fondo oscuro elegante previo a la carga */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- Visor del PDF con mensaje de respaldo si el navegador no soporta PDFs integrados -->
  <iframe src="Sesion18.pdf" type="application/pdf">
    <p>Tu navegador no admite la visualización directa de archivos PDF.
       <a href="Sesion18.pdf">Haz clic aquí para descargar el archivo Sesion18.pdf</a>.
    </p>
  </iframe>

</body>
</html>
