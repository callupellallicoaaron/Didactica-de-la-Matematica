<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 6 - Visualización de Infografía</title>
    <style>
        /* Estilos para que la página sea un marco perfecto para la imagen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50; /* Un gris azulado oscuro para que la imagen resalte */
            overflow: hidden; /* Evita barras de desplazamiento innecesarias */
        }

        .image-wrapper {
            max-width: 98%;
            max-height: 98vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 95vh;
            display: block;
            border: 8px solid white; /* Marco blanco como en una galería */
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra para dar profundidad */
        }

        /* Mensaje flotante por si la imagen no carga */
        .error-msg {
            color: white;
            font-family: sans-serif;
            text-align: center;
            position: absolute;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="error-msg">
        <p>Asegúrate de que el archivo <b>"grupo 12.png"</b> esté en la misma carpeta que este HTML.</p>
    </div>

    <div class="image-wrapper">
        <!-- El navegador buscará exactamente el nombre que especificaste -->
        <img src="grupo 12.png" alt="Infografía Casuística 3 - Grupo 12">
    </div>

</body>
</html>
