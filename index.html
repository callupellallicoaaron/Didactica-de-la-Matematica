  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.05); }
      66% { transform: translate(-10px, 10px) scale(0.95); }
    }
    .anim-fade-up { animation: fadeUp 0.8s ease-out both; }
    .anim-scale-in { animation: scaleIn 0.7s ease-out both; }
    .anim-shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
    .orb { animation: floatOrb 8s ease-in-out infinite; }
    .orb-2 { animation: floatOrb 10s ease-in-out infinite reverse; }
    .orb-3 { animation: floatOrb 12s ease-in-out infinite 2s; }
